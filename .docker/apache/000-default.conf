<VirtualHost *:80>
    # El DocumentRoot debe apuntar a la carpeta 'public' de tu proyecto Laravel
    # dentro del contenedor. '/var/www/html' es una ruta común para montar tu proyecto.
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php


    # Esta sección es crucial para las rutas de Laravel ("pretty URLs").
    # Habilita el uso del archivo .htaccess que se encuentra en tu directorio public.
    <Directory /var/www/html/public>
    Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Este bloque le dice a Apache cómo manejar los archivos PHP.
    # En lugar de procesarlos él mismo, reenviará las peticiones
    # a tu contenedor de PHP-FPM.
    #
    # IMPORTANTE: 'php-fpm' debe ser el nombre de tu servicio de PHP
    # definido en tu archivo docker-compose.yml. En tu archivo original
    # usabas 'service-php', lo cual es correcto si así se llama tu servicio.
    # 'php-fpm' es un nombre más convencional.
    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://service-php:9000"
    </FilesMatch>

    # Redirige los logs a la salida estándar y de error de Docker para una depuración
    # sencilla con el comando 'docker-compose logs'.
    ErrorLog /proc/self/fd/2
    CustomLog /proc/self/fd/1 combined

</VirtualHost>